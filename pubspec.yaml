name: peblo_ai_story_buddy
description: A production-ready AI Story Buddy app for children — Peblo Internship Challenge Submission.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1
  flutter_hooks: ^0.20.5

  # Navigation
  go_router: ^14.2.0

  # TTS
  flutter_tts: ^4.0.2

  # Animations
  flutter_animate: ^4.5.0
  confetti: ^0.7.0

  # UI / Fonts
  google_fonts: ^6.2.1

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Utils
  shared_preferences: ^2.3.1
  path_provider: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/json/quiz.json
